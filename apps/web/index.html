<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/icon-192.png" type="image/png" sizes="192x192" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- PWA Support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Sommi" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Theme Colors (light theme to match app background) -->
    <meta name="theme-color" content="#faf8f5" />
    <meta name="msapplication-TileColor" content="#2d1810" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />
    
    <!-- Description -->
    <meta name="description" content="Sommi — your AI sommelier. Track your cellar, drink windows, and pairing ideas tailored to your collection." />
    
    <!-- Canonical -->
    <link rel="canonical" href="https://sommi-ai.com/" />

    <!-- Open Graph (fallback — react-helmet-async overrides per route) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Sommi" />
    <meta property="og:title" content="Sommi" />
    <meta property="og:description" content="Sommi — AI sommelier &amp; wine cellar app. Track bottles, drink windows, label scan, Vivino CSV import, pairings from your collection. PWA." />
    <meta property="og:image" content="https://sommi-ai.com/icon-512.png" />
    <meta property="og:url" content="https://sommi-ai.com/" />

    <!-- Twitter Card (fallback) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sommi" />
    <meta name="twitter:description" content="Sommi — AI sommelier &amp; wine cellar app. Track bottles, drink windows, label scan, Vivino CSV import, pairings from your collection. PWA." />
    <meta name="twitter:image" content="https://sommi-ai.com/icon-512.png" />

    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="L5yXqSdTyZALHJiyPCwX4oYNAucmy-oubVYSnPxPr0g" />

    <!-- Google tag (gtag.js) — always loads so Tag Assistant can detect it.
         Consent Mode defaults to "denied" until the user accepts cookies.
         analytics.ts calls gtag('consent','update',{analytics_storage:'granted'})
         after the user accepts the cookie banner. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-30KY78JBLP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      // Set consent defaults BEFORE the config call so no data is sent
      // until the user explicitly accepts the cookie consent banner.
      gtag('consent', 'default', {
        analytics_storage: 'denied',
        ad_storage:        'denied',
        wait_for_update:   2000
      });

      gtag('js', new Date());

      // SPA: send_page_view:false — React Router fires page_view manually.
      gtag('config', 'G-30KY78JBLP', {
        send_page_view:                    false,
        anonymize_ip:                      true,
        allow_google_signals:              false,
        allow_ad_personalization_signals:  false
      });
    </script>

    <!-- Meta Pixel Code -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '2154411425345324');
      fbq('track', 'PageView');
    </script>
    <!-- End Meta Pixel Code (noscript fallback is in <body> — <img> is not allowed inside <head><noscript> per HTML5) -->
    
    <title>Sommi</title>
  </head>
  <body>
    <!-- Meta Pixel: noscript fallback (must be in body for valid HTML5) -->
    <noscript
      ><img
        height="1"
        width="1"
        style="display:none"
        src="https://www.facebook.com/tr?id=2154411425345324&ev=PageView&noscript=1"
    /></noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
