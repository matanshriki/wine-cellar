<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/icon-192.png" type="image/png" sizes="192x192" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- PWA Support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Wine Cellar" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Theme Colors (light theme to match app background) -->
    <meta name="theme-color" content="#faf8f5" />
    <meta name="msapplication-TileColor" content="#2d1810" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />
    
    <!-- Description -->
    <meta name="description" content="Your personal wine collection manager with AI-powered recommendations. Track bottles, discover drink windows, and get smart pairing suggestions." />
    
    <!-- Canonical -->
    <link rel="canonical" href="https://wine-cellar-brain.vercel.app/" />

    <!-- Open Graph (fallback — react-helmet-async overrides per route) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Wine Cellar Brain" />
    <meta property="og:title" content="Wine Cellar Brain" />
    <meta property="og:description" content="Your personal wine collection manager with AI-powered recommendations. Track bottles, discover drink windows, and get smart pairing suggestions." />
    <meta property="og:image" content="https://wine-cellar-brain.vercel.app/icon-512.png" />
    <meta property="og:url" content="https://wine-cellar-brain.vercel.app/" />

    <!-- Twitter Card (fallback) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Wine Cellar Brain" />
    <meta name="twitter:description" content="Your personal wine collection manager with AI-powered recommendations. Track bottles, discover drink windows, and get smart pairing suggestions." />
    <meta name="twitter:image" content="https://wine-cellar-brain.vercel.app/icon-512.png" />

    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="L5yXqSdTyZALHJiyPCwX4oYNAucmy-oubVYSnPxPr0g" />

    <!-- Google tag (gtag.js) — always loads so Tag Assistant can detect it.
         Consent Mode defaults to "denied" until the user accepts cookies.
         analytics.ts calls gtag('consent','update',{analytics_storage:'granted'})
         after the user accepts the cookie banner. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-30KY78JBLP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      // Set consent defaults BEFORE the config call so no data is sent
      // until the user explicitly accepts the cookie consent banner.
      gtag('consent', 'default', {
        analytics_storage: 'denied',
        ad_storage:        'denied',
        wait_for_update:   2000
      });

      gtag('js', new Date());

      // SPA: send_page_view:false — React Router fires page_view manually.
      gtag('config', 'G-30KY78JBLP', {
        send_page_view:                    false,
        anonymize_ip:                      true,
        allow_google_signals:              false,
        allow_ad_personalization_signals:  false
      });
    </script>
    
    <title>Wine Cellar Brain</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
